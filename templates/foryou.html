<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You - Personalized Recommendations - CineMood</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-film"></i>
                <span>CineMood</span>
            </div>
            <ul class="nav-links">
                <li><a href="/"><i class="fas fa-home"></i> <span>Home</span></a></li>
                <li><a href="/recommend"><i class="fas fa-compass"></i> <span>Explore</span></a></li>
                <li><a href="/foryou" class="active"><i class="fas fa-heart"></i> <span>For You</span></a></li>
                <li><a href="#" id="favoritesLink"><i class="fas fa-bookmark"></i> <span>Favorites</span></a></li>
            </ul>
        </div>
    </nav>

    <div class="page-container">
        <div class="page-header">
            <h1><i class="fas fa-heart"></i> Just For You</h1>
            <p>Personalized recommendations based on your favorite movies</p>
        </div>

        <div class="favorites-stats" id="favoritesStats">
            <div class="stats-card">
                <i class="fas fa-heart"></i>
                <div>
                    <h3 id="favCount">0</h3>
                    <p>Movies in your favorites</p>
                </div>
            </div>
        </div>

        <!-- Personalized Recommendations -->
        <div class="results-section">
            <div class="section-header">
                <h2><i class="fas fa-brain"></i> AI-Powered Picks For You</h2>
                <button class="refresh-btn" onclick="loadPersonalizedRecommendations()">
                    <i class="fas fa-sync-alt"></i> Refresh
                </button>
            </div>
            <div id="personalizedGrid" class="movies-grid">
                <div class="loading-spinner">
                    <i class="fas fa-spinner fa-spin"></i> Loading your personalized picks...
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <div class="favorites-modal" id="favoritesModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-bookmark"></i> Your Favorite Movies</h2>
                <button class="close-modal" onclick="closeFavoritesModal()">&times;</button>
            </div>
            <div id="favoritesList" class="favorites-list"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadPersonalizedRecommendations();
            updateFavoritesStats();
        });
        
        document.getElementById('favoritesLink').addEventListener('click', (e) => {
            e.preventDefault();
            showFavoritesModal();
        });
    </script>
</body>
</html>
